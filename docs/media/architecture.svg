<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420">
  <style>
    .bg { fill: #0d1117; }
    .border { stroke: #21262d; stroke-width: 1; }
    .accent { fill: #58a6ff; }
    .teal { fill: #3fb950; }
    .text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; }
    .small { font-size: 10px; }
    .dim { fill: #8b949e; }
    .white { fill: #e6edf3; }
    .green { fill: #3fb950; }
    .purple { fill: #bc8cff; }
    .orange { fill: #f0883e; }
    .pink { fill: #f778ba; }
    .card { fill: #161b22; rx: 6; }
    .card-border { stroke: #30363d; stroke-width: 1; fill: none; rx: 6; }
  </style>

  <!-- Background -->
  <rect width="820" height="420" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="title white">Aether-AI Architecture</text>
  <text x="40" y="52" class="text dim">Multi-tier local AI on Android · Clean Architecture · Local-first</text>

  <!-- Row 1: User / TUI -->
  <rect x="40" y="80" width="180" height="80" class="card"/>
  <rect x="40" y="80" width="180" height="80" class="card-border"/>
  <text x="130" y="108" class="title white" text-anchor="middle">👤 User</text>
  <text x="130" y="128" class="text dim" text-anchor="middle">Terminal / Termux</text>
  <text x="130" y="146" class="text dim" text-anchor="middle">`ai` command</text>

  <!-- Arrow: User → Orchestrator -->
  <line x1="220" y1="120" x2="280" y2="120" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 1: Orchestrator -->
  <rect x="280" y="80" width="200" height="80" class="card"/>
  <rect x="280" y="80" width="200" height="80" class="card-border"/>
  <text x="380" y="108" class="title accent" text-anchor="middle">🎯 aether.sh</text>
  <text x="380" y="128" class="text dim" text-anchor="middle">Neural Orchestrator</text>
  <text x="380" y="146" class="text dim" text-anchor="middle">Menu · Boot · Routing</text>

  <!-- Arrow: Orchestrator → Models -->
  <line x1="480" y1="120" x2="540" y2="120" stroke="#30363d" stroke-width="2"/>

  <!-- Row 1: AI Models (4 tiers) -->
  <rect x="540" y="68" width="105" height="48" class="card"/>
  <rect x="540" y="68" width="105" height="48" class="card-border"/>
  <text x="592" y="88" class="text teal" text-anchor="middle" font-weight="bold">⚡ TURBO</text>
  <text x="592" y="106" class="text dim" text-anchor="middle" font-size="9">Llama-3.2-3B</text>

  <rect x="655" y="68" width="105" height="48" class="card"/>
  <rect x="655" y="68" width="105" height="48" class="card-border"/>
  <text x="707" y="88" class="text orange" text-anchor="middle" font-weight="bold">🤖 AGENT</text>
  <text x="707" y="106" class="text dim" text-anchor="middle" font-size="9">Hermes-3-8B</text>

  <rect x="540" y="124" width="105" height="48" class="card"/>
  <rect x="540" y="124" width="105" height="48" class="card-border"/>
  <text x="592" y="144" class="text purple" text-anchor="middle" font-weight="bold">💻 CODE</text>
  <text x="592" y="162" class="text dim" text-anchor="middle" font-size="9">Qwen-Coder-3B</text>

  <rect x="655" y="124" width="105" height="48" class="card"/>
  <rect x="655" y="124" width="105" height="48" class="card-border"/>
  <text x="707" y="144" class="text pink" text-anchor="middle" font-weight="bold">🧠 LOGIC</text>
  <text x="707" y="162" class="text dim" text-anchor="middle" font-size="9">DeepSeek-R1</text>

  <!-- Row 2: Agent (Python) -->
  <rect x="280" y="190" width="200" height="80" class="card"/>
  <rect x="280" y="190" width="200" height="80" class="card-border"/>
  <text x="380" y="218" class="title green" text-anchor="middle">🐍 aether_agent.py</text>
  <text x="380" y="238" class="text dim" text-anchor="middle">Tool Execution Engine</text>
  <text x="380" y="256" class="text dim" text-anchor="middle">llama-server API · &lt;tool&gt; protocol</text>

  <!-- Arrow: Orchestrator → Agent -->
  <line x1="380" y1="160" x2="380" y2="190" stroke="#30363d" stroke-width="2" stroke-dasharray="4"/>

  <!-- Row 3: Toolbox (8 tools) -->
  <rect x="40" y="200" width="210" height="110" class="card"/>
  <rect x="40" y="200" width="210" height="110" class="card-border"/>
  <text x="145" y="222" class="title teal" text-anchor="middle">🧰 Toolbox (10 tools)</text>
  <text x="60" y="244" class="text dim">📅 get_date   🔋 get_battery</text>
  <text x="60" y="262" class="text dim">📁 list_files  🔍 web_search</text>
  <text x="60" y="280" class="text dim">📖 web_read    📓 obsidian_*</text>
  <text x="60" y="298" class="text dim">🧠 learn       ⚙️ gh_status</text>

  <!-- Arrow: Agent → Toolbox -->
  <line x1="280" y1="230" x2="250" y2="230" stroke="#30363d" stroke-width="2" stroke-dasharray="4"/>

  <!-- Row 3: Context7 Vault -->
  <rect x="540" y="190" width="220" height="110" class="card"/>
  <rect x="540" y="190" width="220" height="110" class="card-border"/>
  <text x="650" y="212" class="title purple" text-anchor="middle">🧠 Context7 Vault</text>
  <text x="650" y="234" class="text dim" text-anchor="middle">Persistent AI Memory</text>
  <text x="650" y="252" class="text dim" text-anchor="middle">knowledge/context7/*.md</text>
  <text x="650" y="274" class="text small dim" text-anchor="middle">• Markdown format (Obsidian-ready)</text>
  <text x="650" y="290" class="text small dim" text-anchor="middle">• Auto-loaded each session</text>

  <!-- Arrow: Agent → Context7 -->
  <line x1="480" y1="230" x2="540" y2="230" stroke="#30363d" stroke-width="2" stroke-dasharray="4"/>

  <!-- Row 4: Scripts & Skills -->
  <rect x="40" y="330" width="360" height="70" class="card"/>
  <rect x="40" y="330" width="360" height="70" class="card-border"/>
  <text x="220" y="352" class="title orange" text-anchor="middle">🔧 Scripts &amp; Skills</text>
  <text x="220" y="372" class="text dim" text-anchor="middle">Sentinel · Librarian · Debug Console · Skill Market · Swarm</text>
  <text x="220" y="388" class="text small dim" text-anchor="middle">skills/ (drop-in .md) · scripts/*.sh · scripts/*.py</text>

  <!-- Arrow: Orchestrator → Scripts -->
  <line x1="380" y1="160" x2="220" y2="330" stroke="#30363d" stroke-width="1" stroke-dasharray="3"/>

  <!-- Bottom: Engine -->
  <rect x="430" y="330" width="330" height="70" class="card"/>
  <rect x="430" y="330" width="330" height="70" class="card-border"/>
  <text x="595" y="352" class="title accent" text-anchor="middle">⚙️ Engine: llama.cpp</text>
  <text x="595" y="372" class="text dim" text-anchor="middle">Native C++ · ARM64 NEON · GGUF models</text>
  <text x="595" y="388" class="text small dim" text-anchor="middle">llama-cli (direct) · llama-server (API) · models/*.gguf</text>

  <!-- Arrow: Models → Engine -->
  <line x1="595" y1="172" x2="595" y2="330" stroke="#30363d" stroke-width="1" stroke-dasharray="3"/>

  <!-- Legend -->
  <text x="40" y="410" class="text small dim">Legend: ─ solid = direct call  ┈ dashed = data flow  | All data stays on-device</text>
</svg>
