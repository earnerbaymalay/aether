name: Aether CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint all shell scripts
        run: find . -name "*.sh" ! -path "./.git/*" -exec shellcheck --severity=warning {} \;

      - name: Check Python syntax
        run: find . -name "*.py" ! -path "./.git/*" -exec python3 -m py_compile {} \;

      - name: Verify install.sh is executable
        run: test -x install.sh || (echo "install.sh is not executable" && exit 1)
